name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    permissions:               # needed to upload SARIF to Code Scanning
      contents: read
      actions: read
      security-events: write   # required for SARIF uploads :contentReference[oaicite:0]{index=0}
    env:                       # make your SNYK_TOKEN available to every Snyk step :contentReference[oaicite:1]{index=1}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4    # pin to v4 for stability :contentReference[oaicite:2]{index=2}

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@v1    # pin to the v1 tag and optionally specify version :contentReference[oaicite:3]{index=3}
        with:
          snyk-version: 'latest'

      - name: Snyk Code test
        run: snyk code test --sarif > snyk-code.sarif || true
        # `|| true` must be outside of a comment so the step never fails on issues

      - name: Snyk Open Source monitor
        run: snyk monitor --all-projects

      - name: Snyk IaC test
        run: snyk iac test --report || true

      - name: Build Docker image
        run: docker build -t your/image-to-test .

      - name: Snyk Container monitor
        run: snyk container monitor your/image-to-test --file=Dockerfile

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
